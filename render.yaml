services:
  - type: web
    name: llm-map-api
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: GOOGLE_SEARCH_RADIUS_METERS
        value: "5000"
      - key: GOOGLE_NEAR_ME_RADIUS_METERS
        value: "2500"
      - key: GOOGLE_LANGUAGE
        value: fr
      - key: GOOGLE_REGION
        value: ma
